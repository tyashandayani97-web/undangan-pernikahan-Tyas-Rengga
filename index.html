<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan: Tyas & Subekhan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-pastel: #f1f6f0;
            --sage-green: #7d9d85;
            --sage-dark: #4a6351;
            --gold-accent: #c5a880;
            --text-dark: #2c3e32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-pastel);
            color: var(--text-dark);
            overflow-x: hidden;
            text-align: center;
        }

        /* Hero / Cover Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(241, 246, 240, 0.85), rgba(241, 246, 240, 0.95)),
                        url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1964&auto=format&fit=crop') center/cover;
            padding: 20px;
            border-bottom: 8px solid var(--sage-green);
        }

        .hero h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: var(--sage-dark);
            margin-bottom: 10px;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 4rem;
            color: var(--sage-dark);
            margin: 20px 0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        /* Gunungan/Batik Silhouette Simulation using CSS */
        .jawa-ornament {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border: 2px solid var(--gold-accent);
            transform: rotate(45deg);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .jawa-ornament::after {
            content: 'ꦯ';
            font-size: 2rem;
            color: var(--gold-accent);
            transform: rotate(-45deg);
        }

        /* Pasangan Mempelai Section */
        .mempelai {
            padding: 80px 20px;
            background-color: #ffffff;
        }

        .mempelai h2 {
            font-family: 'Cinzel', serif;
            color: var(--sage-dark);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .mempelai-box {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .nama-lengkap {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--sage-dark);
            margin-bottom: 5px;
        }

        .orang-tua {
            font-size: 0.9rem;
            color: #666;
            font-style: italic;
            line-height: 1.6;
        }

        .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: var(--gold-accent);
            margin: 10px 0;
        }

        /* Acara / Agenda Section */
        .acara {
            padding: 80px 20px;
            background: linear-gradient(var(--bg-pastel), #e4ede3);
        }

        .acara h2 {
            font-family: 'Cinzel', serif;
            color: var(--sage-dark);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .grid-acara {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card-acara {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 280px;
            max-width: 320px;
            border-top: 5px solid var(--sage-green);
            transition: transform 0.3s ease;
        }

        .card-acara:hover {
            transform: translateY(-5px);
        }

        .card-acara h3 {
            font-family: 'Cinzel', serif;
            color: var(--sage-dark);
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .card-acara p {
            font-size: 0.95rem;
            margin: 8px 0;
            line-height: 1.5;
        }

        .date-highlight {
            font-weight: 600;
            color: var(--sage-dark);
        }

        /* Countdown Section */
        .countdown-section {
            background-color: var(--sage-dark);
            color: #ffffff;
            padding: 5px 20px 40px 20px;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .countdown-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            min-width: 70px;
        }
